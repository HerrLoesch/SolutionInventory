name: Manual Full Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact release version (e.g. 1.7.2). Overrides release_type when set."
        required: false
        default: ""
      release_type:
        description: "Semantic version bump type (used when 'version' is empty)"
        type: choice
        options:
          - patch
          - minor
          - major
        required: false
        default: patch
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # 1. Determine / bump version and push tag
  # ------------------------------------------------------------------
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies (skip scripts to avoid Playwright download)
        run: npm ci --ignore-scripts
        working-directory: Client

      - name: Configure Git identity
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

      - name: Determine version from tag (tag push)
        if: github.event_name == 'push'
        id: from-tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Bump or set version and push tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: from-dispatch
        run: |
          CUSTOM="${{ inputs.version }}"
          if [ -n "$CUSTOM" ]; then
            npm version "$CUSTOM" --no-git-tag-version --allow-same-version
          else
            npm version "${{ inputs.release_type }}" --no-git-tag-version
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: release v${VERSION} [skip ci]"
          git tag "v${VERSION}" || true
          git push origin main || true
          git push origin "v${VERSION}"
        working-directory: Client

      - name: Set combined version output
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${{ steps.from-tag.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.from-dispatch.outputs.version }}" >> $GITHUB_OUTPUT
          fi

  # ------------------------------------------------------------------
  # 2. Build the Electron app (parallel matrix)
  # ------------------------------------------------------------------
  build-electron:
    name: Build Electron (${{ matrix.artifact_name }})
    needs: version
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            electron_flags: --linux --x64
          - os: windows-latest
            artifact_name: windows-x64
            electron_flags: --win --x64
          - os: macos-latest
            artifact_name: macos-arm64
            electron_flags: --mac --arm64
          - os: macos-13
            artifact_name: macos-x64
            electron_flags: --mac --x64

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.version.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb1 libxrandr2 libxcomposite1 libxcursor1 libxdamage1 \
            libxfixes3 libxi6 libgtk-3-0t64 libatk1.0-0t64 libcairo-gobject2 \
            libgdk-pixbuf-2.0-0 libasound2t64 libgtk-4-1 libvulkan1 libopus0 \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 \
            libgstreamer-plugins-bad1.0-0 libflite1 libwebp7 libharfbuzz-icu0 \
            libwayland-server0 libmanette-0.2-0 libenchant-2-2 libgbm1 libdrm2 \
            libhyphen0 libgles2 rpm fakeroot dpkg

      - name: Install dependencies (skip scripts to avoid Playwright download)
        run: npm ci --ignore-scripts
        working-directory: Client

      - name: Build Vite + Electron app
        run: npx vite build --mode electron && npx electron-builder ${{ matrix.electron_flags }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: Client

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            Client/release/*.AppImage
            Client/release/*.deb

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: Client/release/*.exe

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            Client/release/**/*.dmg
            Client/release/**/*.zip

  # ------------------------------------------------------------------
  # 3. Create a GitHub Release with all Electron artifacts
  # ------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [version, build-electron]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: "Release v${{ needs.version.outputs.version }}"
          body: |
            Release v${{ needs.version.outputs.version }}

            **Included binaries:**
            | Platform | Format |
            |---|---|
            | Windows x64 | NSIS Installer (`.exe`), Portable (`.exe`) |
            | Linux x64 | AppImage, Debian package (`.deb`) |
            | macOS arm64 (Apple Silicon) | DMG, ZIP |
            | macOS x64 (Intel) | DMG, ZIP |
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # 4. Build web app and deploy to GitHub Pages
  # ------------------------------------------------------------------
  deploy-pages:
    name: Deploy GitHub Pages
    needs: version
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies (skip scripts to avoid Playwright download)
        run: npm ci --ignore-scripts
        working-directory: Client

      - name: Build web application
        run: npx vite build
        working-directory: Client

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
