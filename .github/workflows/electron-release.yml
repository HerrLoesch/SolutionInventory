name: Manual Full Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semantic version bump type
        type: choice
        options:
          - patch
          - minor
          - major
        required: true
        default: minor

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # 0. Ensure this workflow is only run from main
  # ------------------------------------------------------------------
  validate-main:
    name: Validate Main Branch
    runs-on: ubuntu-latest

    steps:
      - name: Ensure workflow ref is main
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "This workflow can only run from main. Current ref: ${{ github.ref_name }}"
            exit 1
          fi

  # ------------------------------------------------------------------
  # 1. Bump the selected semantic version and create a tag
  # ------------------------------------------------------------------
  version:
    name: Bump Version
    needs: validate-main
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Client

      - name: Configure Git identity
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"

      - name: Bump selected version and push
        id: bump
        run: |
          npm version ${{ inputs.release_type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          git add package.json package-lock.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"
        working-directory: Client

  # ------------------------------------------------------------------
  # 2. Build the Electron app (parallel matrix: Linux + Windows)
  # ------------------------------------------------------------------
  build-electron:
    name: Build Electron (${{ matrix.artifact_name }})
    needs: version
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            electron_flags: --linux --x64
          - os: windows-latest
            artifact_name: windows-x64
            electron_flags: --win --x64

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.version.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb1 libxrandr2 libxcomposite1 libxcursor1 libxdamage1 \
            libxfixes3 libxi6 libgtk-3-0t64 libatk1.0-0t64 libcairo-gobject2 \
            libgdk-pixbuf-2.0-0 libasound2t64 libgtk-4-1 libvulkan1 libopus0 \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 \
            libgstreamer-plugins-bad1.0-0 libflite1 libwebp7 libharfbuzz-icu0 \
            libwayland-server0 libmanette-0.2-0 libenchant-2-2 libgbm1 libdrm2 \
            libhyphen0 libgles2 rpm fakeroot dpkg

      - name: Install dependencies
        run: npm ci
        working-directory: Client

      - name: Build Vite + Electron app
        run: npx vite build --mode electron && npx electron-builder ${{ matrix.electron_flags }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: Client

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            Client/release/*.AppImage
            Client/release/*.deb

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: Client/release/*.exe

  # ------------------------------------------------------------------
  # 3. Create a GitHub Release with all Electron artifacts
  # ------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [version, build-electron]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: "Release v${{ needs.version.outputs.version }}"
          body: |
            Release v${{ needs.version.outputs.version }}

            Manually triggered full release.
            Source branch: main
            Release type: ${{ inputs.release_type }}
            Commit: ${{ github.sha }}
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # 4. Build the web app and deploy to GitHub Pages
  # ------------------------------------------------------------------
  deploy-pages:
    name: Deploy GitHub Pages
    needs: version
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: refs/tags/v${{ needs.version.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Client

      - name: Build web application
        run: npx vite build
        working-directory: Client

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
