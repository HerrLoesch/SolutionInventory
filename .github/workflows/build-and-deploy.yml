name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-xcb1 \
            libxrandr2 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libgtk-3-0t64 \
            libatk1.0-0t64 \
            libcairo-gobject2 \
            libgdk-pixbuf-2.0-0 \
            libasound2t64 \
            libgtk-4-1 \
            libvulkan1 \
            libopus0 \
            libgstreamer1.0-0 \
            libgstreamer-plugins-base1.0-0 \
            libgstreamer-plugins-bad1.0-0 \
            libflite1 \
            libwebp7 \
            libharfbuzz-icu0 \
            libwayland-server0 \
            libmanette-0.2-0 \
            libenchant-2-2 \
            libgbm1 \
            libdrm2 \
            libhyphen0 \
            libgles2

      - name: Install dependencies
        run: npm ci

      - name: Start dev server
        run: npx vite &

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173/SolutionInventory/ --timeout 30000

      - name: Build application
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
