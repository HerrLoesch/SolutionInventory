<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solution Inventory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1565C0;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }

    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.25));
    }

    .title {
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.65);
      font-size: 13px;
      margin-top: -16px;
      letter-spacing: 0.04em;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="logo-img" class="logo-img" alt="Solution Inventory" />
    <div class="title">Solution Inventory</div>
    <div class="subtitle">Loading…</div>
    <div class="spinner"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const logo = params.get('logo');
    if (logo) document.getElementById('logo-img').src = logo;
  </script>
</body>
</html>
