<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Server – Management UI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1d23;
      --surface: #22262e;
      --surface2: #2b303b;
      --border: #353b48;
      --accent: #4f8ef7;
      --accent-hover: #6ba3ff;
      --danger: #e05555;
      --success: #4caf82;
      --warning: #e0a055;
      --text: #d4d8e2;
      --text-muted: #7a8190;
      --log-bg: #0d0f13;
      --log-text: #b8c0cc;
      --log-info: #7ec8e3;
      --log-warn: #e0c055;
      --log-error: #e05555;
      --radius: 8px;
      --font: 'Segoe UI', system-ui, sans-serif;
      --mono: 'Cascadia Code', 'Consolas', 'Menlo', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
    header h1 span { color: var(--accent); }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.connected  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    #status-dot.error      { background: var(--danger); }

    #status-label { font-size: 12px; color: var(--text-muted); }

    /* ── Main two-panel layout ── */
    main {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    /* ── Panel shared ── */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-header h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }

    /* ── Log Panel ── */
    #log-panel { border-right: 1px solid var(--border); }

    #log-output {
      flex: 1;
      overflow-y: auto;
      background: var(--log-bg);
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--log-text);
      resize: none;
      border: none;
      outline: none;
    }

    .log-line { display: flex; gap: 8px; }
    .log-ts   { color: var(--text-muted); white-space: nowrap; }
    .log-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      align-self: flex-start;
      margin-top: 2px;
      white-space: nowrap;
    }
    .badge-INFO    { background: #1d3a5c; color: var(--log-info); }
    .badge-WARNING { background: #3d2e08; color: var(--log-warn); }
    .badge-ERROR   { background: #3d1010; color: var(--log-error); }
    .log-msg       { word-break: break-word; }

    .log-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Config Panel ── */
    #config-panel {
      background: var(--surface);
      overflow-y: auto;
    }

    .config-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .config-section h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: 12px; color: var(--text-muted); }
    .field input[type="text"], .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    .field input[type="text"]:focus, .field select:focus {
      border-color: var(--accent);
    }
    .field select option { background: var(--surface2); }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .toggle-row span { font-size: 13px; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      transition: background 0.25s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 14px; width: 14px;
      left: 3px; top: 3px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
    .toggle input:checked + .toggle-slider { background: #1a3a5c; border-color: var(--accent); }
    .toggle input:checked + .toggle-slider::before {
      background: var(--accent);
      transform: translateX(18px);
    }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .save-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    #save-feedback {
      font-size: 12px;
      color: var(--success);
      opacity: 0;
      transition: opacity 0.4s;
    }
    #save-feedback.visible { opacity: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <div id="status-dot"></div>
  <span id="status-label">Connecting…</span>
  <h1>Solution Inventory &mdash; <span>MCP Server</span></h1>
</header>

<main>

  <!-- ── Left: Log Console ── -->
  <section class="panel" id="log-panel">
    <div class="panel-header">
      <h2>Request Log</h2>
      <div class="log-controls">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer;">
          <input type="checkbox" id="autoscroll" checked style="accent-color:var(--accent);" />
          Auto-scroll
        </label>
        <button class="btn btn-ghost" id="clear-btn" style="padding:4px 10px;font-size:12px;">Clear</button>
      </div>
    </div>
    <div id="log-output" role="log" aria-live="polite" aria-label="Server log output"></div>
  </section>

  <!-- ── Right: Configuration ── -->
  <section class="panel" id="config-panel">
    <div class="panel-header">
      <h2>Configuration</h2>
    </div>
    <div class="config-body">

      <div class="config-section">
        <h3>Access Control</h3>
        <label class="toggle-row" for="access-toggle">
          <span>Allow incoming MCP requests</span>
          <span class="toggle">
            <input type="checkbox" id="access-toggle" />
            <span class="toggle-slider"></span>
          </span>
        </label>
      </div>

      <div class="config-section">
        <h3>Data Source</h3>
        <div class="field">
          <label for="data-source">Source type</label>
          <select id="data-source">
            <option value="local">Local (built-in)</option>
            <option value="remote">Remote URL</option>
            <option value="filesystem">File system path</option>
          </select>
        </div>
        <div class="field" id="url-field">
          <label for="data-source-url">URL / Path</label>
          <input type="text" id="data-source-url" placeholder="https://… or /path/to/data" />
        </div>
      </div>

      <div class="config-section">
        <h3>Available Tools</h3>
        <div style="font-size:13px;line-height:1.7;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;">
          <code style="font-family:var(--mono);color:var(--accent);">get_current_time</code>
          <p style="color:var(--text-muted);font-size:12px;margin-top:4px;">Returns the current local date and time of the MCP server host.</p>
        </div>
      </div>

      <div class="save-row">
        <button class="btn btn-primary" id="save-btn">Save Configuration</button>
        <span id="save-feedback">&#10003; Saved</span>
      </div>

    </div>
  </section>

</main>

<script>
(function () {
  'use strict';

  // ── Elements
  const logOutput    = document.getElementById('log-output');
  const clearBtn     = document.getElementById('clear-btn');
  const autoscroll   = document.getElementById('autoscroll');
  const statusDot    = document.getElementById('status-dot');
  const statusLabel  = document.getElementById('status-label');
  const accessToggle = document.getElementById('access-toggle');
  const dataSource   = document.getElementById('data-source');
  const dataUrl      = document.getElementById('data-source-url');
  const urlField     = document.getElementById('url-field');
  const saveBtn      = document.getElementById('save-btn');
  const saveFeedback = document.getElementById('save-feedback');

  // ── Log rendering
  const LEVEL_CLASS = { INFO: 'badge-INFO', WARNING: 'badge-WARNING', ERROR: 'badge-ERROR' };

  function appendLog(entry) {
    const line = document.createElement('div');
    line.className = 'log-line';

    const ts    = document.createElement('span');
    ts.className = 'log-ts';
    ts.textContent = entry.ts;

    const badge = document.createElement('span');
    badge.className = `log-badge ${LEVEL_CLASS[entry.level] || 'badge-INFO'}`;
    badge.textContent = entry.level;

    const msg = document.createElement('span');
    msg.className = 'log-msg';
    msg.textContent = entry.msg;

    line.append(ts, badge, msg);
    logOutput.appendChild(line);

    if (autoscroll.checked) {
      logOutput.scrollTop = logOutput.scrollHeight;
    }
  }

  clearBtn.addEventListener('click', () => { logOutput.innerHTML = ''; });

  // ── WebSocket connection with auto-reconnect
  let ws;
  let reconnectTimer;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/logs`);

    ws.onopen = () => {
      clearTimeout(reconnectTimer);
      statusDot.className = 'connected';
      statusLabel.textContent = 'Connected';
    };

    ws.onmessage = (evt) => {
      try {
        appendLog(JSON.parse(evt.data));
      } catch { /* ignore */ }
    };

    ws.onerror = () => {
      statusDot.className = 'error';
      statusLabel.textContent = 'Connection error';
    };

    ws.onclose = () => {
      statusDot.className = '';
      statusLabel.textContent = 'Disconnected – reconnecting…';
      reconnectTimer = setTimeout(connect, 3000);
    };
  }

  // Keep-alive ping every 20 s
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping');
  }, 20_000);

  connect();

  // ── Config load
  async function loadConfig() {
    try {
      const res  = await fetch('/api/config');
      const cfg  = await res.json();
      accessToggle.checked   = !!cfg.access_enabled;
      dataSource.value       = cfg.data_source || 'local';
      dataUrl.value          = cfg.data_source_url || '';
      toggleUrlField();
    } catch (e) {
      console.error('Failed to load config:', e);
    }
  }

  function toggleUrlField() {
    urlField.style.display = dataSource.value === 'local' ? 'none' : 'flex';
  }

  dataSource.addEventListener('change', toggleUrlField);

  // ── Config save
  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    try {
      const payload = {
        access_enabled:  accessToggle.checked,
        data_source:     dataSource.value,
        data_source_url: dataUrl.value.trim(),
      };
      const res = await fetch('/api/config', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(await res.text());
      saveFeedback.classList.add('visible');
      setTimeout(() => saveFeedback.classList.remove('visible'), 2500);
    } catch (e) {
      alert('Failed to save configuration: ' + e.message);
    } finally {
      saveBtn.disabled = false;
    }
  });

  loadConfig();
}());
</script>

</body>
</html>
